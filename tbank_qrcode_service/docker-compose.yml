version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      TINKOFF_API_URL: https://securepay.tinkoff.ru/v2/
      TINKOFF_TERMINAL_KEY: ${TINKOFF_TERMINAL_KEY}
      TINKOFF_SECRET_KEY: ${TINKOFF_SECRET_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5433/payments_db
      SPRING_DATASOURCE_USERNAME: payments
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
      - redis
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
    ports:
      - "5433:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
